<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Com Info - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f4f7fe;
            --primary: #4361ee;
            --white: #ffffff;
            --text-dark: #2b3674;
            --text-gray: #a3aed0;
            --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
        }

        header {
            background: #345da7;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main { padding: 30px; max-width: 1400px; margin: 0 auto; }

        /* Filter Section */
        .filter-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; }
        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border: 1px solid #e0e5f2;
            border-radius: 10px;
            outline: none;
            color: var(--text-dark);
        }

        .btn-apply {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            color: white;
        }

        .stat-card .label { font-size: 13px; opacity: 0.9; }
        .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 5px; }

        .bg-blue { background: #5677db; }
        .bg-orange { background: #ffb84d; }
        .bg-green { background: #4ecb71; }
        .bg-red { background: #f26464; }

        /* Table Section */
        .table-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { 
            text-align: left; 
            padding: 12px; 
            color: var(--text-gray); 
            border-bottom: 1px solid #e0e5f2;
            font-weight: 600;
        }
        td { padding: 15px 12px; border-bottom: 1px solid #f4f7fe; }

        .badge-unpaid { background: #ffebeb; color: #ff5b5b; padding: 4px 8px; border-radius: 10px; font-weight: 600; font-size: 11px; }
        .btn-paid { background: #2b3674; color: white; border: none; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 600;">Com Info - Admin</div>
    <a href="sign in.html" style="color: white; text-decoration: none; font-size: 13px;">Logout</a>
</header>

<main>
    <h2 style="margin-top: 0; margin-bottom: 20px;">Building Electricity Usage Report</h2>

    <div class="filter-card">
        <div class="filter-row">
            <div class="filter-group">
                <label>Period</label>
                <select><option>ม.ค. 2569</option></select>
            </div>
            <div class="filter-group">
                <label>Year</label>
                <select><option>2026</option></select>
            </div>
            <div class="filter-group">
                <label>Month</label>
                <select><option>January</option></select>
            </div>
            <div class="filter-group">
                <label>Floor</label>
                <select><option>All Floors</option></select>
            </div>
            <button class="btn-apply">Apply Filter</button>
        </div>
        <div class="filter-row" style="margin-top: 15px;">
            <div class="filter-group">
                <label>Utility Rate (฿/kWh)</label>
                <input type="number" value="8" id="rateInput">
            </div>
            <button class="btn-apply" style="background: #f4f7fe; color: #2b3674; border: 1px solid #e0e5f2;" onclick="loadAllData()">Recalculate</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card bg-blue">
            <span class="label">Total Rooms</span>
            <span class="value" id="statRooms">37</span>
        </div>
        <div class="stat-card bg-orange">
            <span class="label">Total Units Used</span>
            <span class="value" id="statUnits">0 kWh</span>
        </div>
        <div class="stat-card bg-green">
            <span class="label">Total Revenue</span>
            <span class="value" id="statIncome">0 ฿</span>
        </div>
        <div class="stat-card bg-red">
            <span class="label">Total Profit</span>
            <span class="value" id="statProfit">0 ฿</span>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>FLOOR</th>
                    <th>ROOM</th>
                    <th>METER</th>
                    <th>UNITS (kWh)</th>
                    <th>TENANT COST (฿)</th>
                    <th>FINE (฿)</th>
                    <th>TOTAL (฿)</th>
                    <th>PROVIDER COST (฿)</th>
                    <th>PROFIT (฿)</th>
                    <th>STATUS</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="allRoomsBody">
                </tbody>
        </table>
    </div>
</main>

<script>
    const API_BASE = 'https://paosudlor-project.onrender.com';

    async function loadAllData() {
        try {
            // ดึงข้อมูลรายงานสรุป
            const reportResp = await fetch(`${API_BASE}/api/admin-report`);
            const reportData = await reportResp.json();
            
            document.getElementById('statUnits').innerText = (reportData.total_units || 0).toLocaleString() + ' kWh';
            document.getElementById('statIncome').innerText = (reportData.income_from_tenants || 0).toLocaleString() + ' ฿';
            document.getElementById('statProfit').innerText = (reportData.profit || 0).toLocaleString() + ' ฿';

            // ดึงข้อมูลรายห้อง
            const roomsResp = await fetch(`${API_BASE}/api/admin-all-rooms`);
            const roomsData = await roomsResp.json();
            const tbody = document.getElementById('allRoomsBody');
            tbody.innerHTML = '';

            roomsData.forEach(room => {
                const tr = document.createElement('tr');
                const providerCost = room.units_used * 4.5; // ตัวอย่างค่าไฟ PEA 4.5 บาท
                const tenantCost = room.units_used * 8;
                const profit = tenantCost - providerCost;

                tr.innerHTML = `
                    <td>${room.room_number.toString().charAt(0)}</td>
                    <td>${room.room_number}</td>
                    <td>${room.room_number}</td>
                    <td>${room.units_used}</td>
                    <td>${tenantCost.toLocaleString()}</td>
                    <td>0</td>
                    <td>${tenantCost.toLocaleString()}</td>
                    <td style="color:#a3aed0">${providerCost.toLocaleString()}</td>
                    <td style="color:#4ecb71; font-weight:600">${profit.toLocaleString()}</td>
                    <td><span class="badge-unpaid">Unpaid</span></td>
                    <td><button class="btn-paid">Mark as Paid</button></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error(err);
        }
    }

    window.onload = loadAllData;
</script>
</body>
</html>
