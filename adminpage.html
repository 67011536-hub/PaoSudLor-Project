<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard – Com Info</title>
    <style>
        :root {
            --bg: #f7f8fa;
            --card: #ffffff;
            --primary: #3466af;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,.1);
            --text: #343a40;
            --muted: #6c757d;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: var(--primary);
            color: #fff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 400;
        }
        main {
            padding: 2rem;
        }
        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 900px;
            margin: 0 auto 1.5rem auto;
        }
        .filter-section {
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            align-items: end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        .filter-group label {
            font-weight: 500;
            margin-bottom: .25rem;
            font-size: .9rem;
        }
        .filter-group select, .filter-group input {
            padding: .5rem;
            border: 1px solid #ccc;
            border-radius: var(--radius);
            font-size: 1rem;
        }
        button.filter-btn {
            padding: .5rem 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
        }
        button.filter-btn:hover { background: #234a86; }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
            font-size: .9rem;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: .5rem .75rem;
            text-align: center;
        }
        th {
            background: var(--bg);
            font-weight: 500;
        }
        .logout {
            color: #fff;
            text-decoration: none;
            font-size: .9rem;
        }
        .logout:hover { text-decoration: underline; }
        .profit-pos { color: green; font-weight: bold; }
        .profit-neg { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Com Info – Admin Control</h1>
        <a href="sign in.html" class="logout">Logout</a>
    </header>
    <main>
        <div class="card">
            <h2>Building Usage Summary</h2>
            <p style="font-size: 0.85rem; color: var(--muted);">Data pulled from PostgreSQL on Render</p>
            <table id="usageTable">
                <thead>
                    <tr>
                        <th>Total Units (kWh)</th>
                        <th>Income (Tenants)</th>
                        <th>Cost (PEA)</th>
                        <th>Net Profit</th>
                    </tr>
                </thead>
                <tbody id="summaryBody">
                    <tr><td colspan="4">Loading data...</td></tr>
                </tbody>
            </table>
            <button class="filter-btn" style="margin-top: 1rem;" onclick="fetchAdminSummary()">Refresh Report</button>
        </div>

        <div class="card">
            <h3>Add Monthly Reading</h3>
            <div class="filter-section">
                <div class="filter-group">
                    <label>Meter ID (Room)</label>
                    <input type="number" id="meterIdInput" placeholder="e.g. 101">
                </div>
                <div class="filter-group">
                    <label>Current Reading (kWh)</label>
                    <input type="number" id="meterValInput" placeholder="e.g. 1250">
                </div>
                <button class="filter-btn" onclick="saveReading()">Save Reading</button>
            </div>
        </div>
    </main>

    <script>
        // ฟังก์ชันดึงข้อมูลจาก API /api/admin-report ใน Server.js
        async function fetchAdminSummary() {
            try {
                const resp = await fetch('/api/admin-report');
                const data = await resp.json();
                
                const tbody = document.getElementById('summaryBody');
                tbody.innerHTML = '';

                const tr = document.createElement('tr');
                const profitClass = data.profit >= 0 ? 'profit-pos' : 'profit-neg';
                
                tr.innerHTML = `
                    <td>${data.total_units || 0}</td>
                    <td>${(data.income_from_tenants || 0).toLocaleString()} ฿</td>
                    <td>${(data.cost_to_pea || 0).toLocaleString()} ฿</td>
                    <td class="${profitClass}">${(data.profit || 0).toLocaleString()} ฿</td>
                `;
                tbody.appendChild(tr);
            } catch (err) {
                console.error('Fetch Error:', err);
                document.getElementById('summaryBody').innerHTML = '<tr><td colspan="4" style="color:red;">Error connecting to API</td></tr>';
            }
        }
        // ฟังก์ชันส่งข้อมูลไปให้ Server
        async function saveReading() {
            const meterId = document.getElementById('meterIdInput').value;
            const kwhValue = document.getElementById('meterValInput').value;

            if(!meterId || !kwhValue) {
                alert("กรุณากรอกข้อมูลให้ครบ!");
                return;
            }

            try {
                const response = await fetch('/api/add-meter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ meterId: meterId, kwhValue: kwhValue })
                });
                
                const result = await response.json();
                if(result.success) {
                    alert("✅ บันทึกข้อมูลสำเร็จ! ระบบสร้างบัญชีให้ห้องนี้แล้ว");
                    document.getElementById('meterIdInput').value = '';
                    document.getElementById('meterValInput').value = '';
                    fetchAdminSummary(); // รีเฟรชตารางตัวเลขทันที
                } else {
                    alert("❌ Error: " + result.error);
                }
            } catch(err) {
                alert("ไม่สามารถเชื่อมต่อ Server ได้");
            }
        }
        // โหลดข้อมูลทันทีที่เปิดหน้า
        window.onload = fetchAdminSummary;
    </script>
</body>
</html>
