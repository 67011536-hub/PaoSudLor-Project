<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Com Info - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f4f7fe;
            --primary: #4361ee;
            --white: #ffffff;
            --text-dark: #2b3674;
            --text-gray: #a3aed0;
            --shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
        }

        header {
            background: #345da7;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main { padding: 30px; max-width: 1400px; margin: 0 auto; }

        /* Filter Section */
        .filter-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; }
        .filter-group select, .filter-group input {
            padding: 8px 12px;
            border: 1px solid #e0e5f2;
            border-radius: 10px;
            outline: none;
            color: var(--text-dark);
            min-width: 120px;
        }

        .btn-apply {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            color: white;
        }

        .stat-card .label { font-size: 13px; opacity: 0.9; }
        .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 5px; }

        .bg-blue { background: #5677db; }
        .bg-orange { background: #ffb84d; }
        .bg-green { background: #4ecb71; }
        .bg-red { background: #f26464; }

        /* Table Section */
        .table-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); border-bottom: 1px solid #e0e5f2; font-weight: 600; }
        td { padding: 15px 12px; border-bottom: 1px solid #f4f7fe; }

        .badge-unpaid { background: #ffebeb; color: #ff5b5b; padding: 4px 8px; border-radius: 10px; font-weight: 600; font-size: 11px; }
        .btn-paid { background: #2b3674; color: white; border: none; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 600;">Com Info - Admin Control</div>
    <a href="sign in.html" style="color: white; text-decoration: none; font-size: 13px;">Logout</a>
</header>

<main>
    <h2 style="margin-top: 0; margin-bottom: 20px;">Building Electricity Usage Report</h2>

    <div class="filter-card">
        <div class="filter-row">
            <div class="filter-group">
                <label>Year</label>
                <select id="yearFilter"></select>
            </div>
            <div class="filter-group">
                <label>Month</label>
                <select id="monthFilter">
                    <option value="1">January</option><option value="2">February</option>
                    <option value="3">March</option><option value="4">April</option>
                    <option value="5">May</option><option value="6">June</option>
                    <option value="7">July</option><option value="8">August</option>
                    <option value="9">September</option><option value="10">October</option>
                    <option value="11">November</option><option value="12">December</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Floor</label>
                <select id="floorFilter">
                    <option value="all">All Floors</option>
                    <option value="1">Floor 1</option>
                    <option value="2">Floor 2</option>
                    <option value="3">Floor 3</option>
                </select>
            </div>
            <button class="btn-apply" onclick="applyFilters()">Apply Filter</button>
        </div>
        <div class="filter-row" style="margin-top: 15px; border-top: 1px solid #f4f7fe; padding-top: 15px;">
            <div class="filter-group">
                <label>Utility Rate (฿/kWh)</label>
                <input type="number" value="8" id="rateInput" step="0.1">
            </div>
            <button class="btn-apply" style="background: #f4f7fe; color: #2b3674; border: 1px solid #e0e5f2;" onclick="recalculateAll()">Recalculate</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card bg-blue">
            <span class="label">Total Rooms</span>
            <span class="value" id="statRooms">0</span>
        </div>
        <div class="stat-card bg-orange">
            <span class="label">Total Units Used</span>
            <span class="value" id="statUnits">0 kWh</span>
        </div>
        <div class="stat-card bg-green">
            <span class="label">Total Revenue</span>
            <span class="value" id="statIncome">0 ฿</span>
        </div>
        <div class="stat-card bg-red">
            <span class="label">Total Profit</span>
            <span class="value" id="statProfit">0 ฿</span>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>FLOOR</th><th>ROOM</th><th>METER</th><th>UNITS (kWh)</th>
                    <th>TENANT COST (฿)</th><th>FINE (฿)</th><th>TOTAL (฿)</th>
                    <th>PROVIDER COST (฿)</th><th>PROFIT (฿)</th><th>STATUS</th><th>ACTION</th>
                </tr>
            </thead>
            <tbody id="allRoomsBody">
                <tr><td colspan="11" style="text-align:center;">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    const API_BASE = 'https://paosudlor-project.onrender.com';
    let allRoomsData = [];

    // ฟังก์ชันสร้างปี 2020-2026
    function setupYearFilter() {
        const yearSelect = document.getElementById('yearFilter');
        for (let y = 2026; y >= 2020; y--) {
            let opt = document.createElement('option');
            opt.value = y;
            opt.innerHTML = y;
            yearSelect.appendChild(opt);
        }
    }

    // ดึงข้อมูล
    async function loadData() {
        try {
            const resp = await fetch(`${API_BASE}/api/admin-all-rooms`);
            allRoomsData = await resp.json();
            renderTable();
            updateSummary();
        } catch (err) {
            console.error(err);
        }
    }

    // แสดงผลตาราง (รองรับ Filter ชั้น และการคำนวณ Rate)
    function renderTable() {
        const tbody = document.getElementById('allRoomsBody');
        const rate = parseFloat(document.getElementById('rateInput').value) || 8;
        const floorFilter = document.getElementById('floorFilter').value;
        tbody.innerHTML = '';

        const filteredData = allRoomsData.filter(room => {
            const floor = room.room_number.toString().charAt(0);
            return floorFilter === 'all' || floor === floorFilter;
        });

        filteredData.forEach(room => {
            const floor = room.room_number.toString().charAt(0);
            const providerCost = room.units_used * 4.5;
            const tenantCost = room.units_used * rate;
            const profit = tenantCost - providerCost;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${floor}</td>
                <td><strong>${room.room_number}</strong></td>
                <td>${room.room_number}</td>
                <td>${room.units_used.toLocaleString()}</td>
                <td>${tenantCost.toLocaleString()}</td>
                <td>0</td>
                <td>${tenantCost.toLocaleString()}</td>
                <td style="color:#a3aed0">${providerCost.toLocaleString()}</td>
                <td style="color:${profit >= 0 ? '#4ecb71' : '#f26464'}; font-weight:600">${profit.toLocaleString()}</td>
                <td><span class="badge-unpaid">Unpaid</span></td>
                <td><button class="btn-paid">Mark as Paid</button></td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('statRooms').innerText = filteredData.length;
    }

    // อัปเดตกล่องตัวเลขด้านบน
    function updateSummary() {
        const rate = parseFloat(document.getElementById('rateInput').value) || 8;
        let totalUnits = 0, totalIncome = 0, totalCost = 0;

        allRoomsData.forEach(room => {
            totalUnits += room.units_used;
            totalIncome += (room.units_used * rate);
            totalCost += (room.units_used * 4.5);
        });

        document.getElementById('statUnits').innerText = totalUnits.toLocaleString() + ' kWh';
        document.getElementById('statIncome').innerText = totalIncome.toLocaleString() + ' ฿';
        document.getElementById('statProfit').innerText = (totalIncome - totalCost).toLocaleString() + ' ฿';
    }

    function recalculateAll() { renderTable(); updateSummary(); }
    function applyFilters() { renderTable(); }

    window.onload = () => {
        setupYearFilter();
        loadData();
    };
</script>
</body>
</html>
