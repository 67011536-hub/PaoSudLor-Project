<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard – Com Info</title>
    <style>
        :root {
            --bg: #f7f8fa;
            --card: #ffffff;
            --primary: #3466af;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,.1);
            --text: #343a40;
            --muted: #6c757d;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: var(--primary);
            color: #fff;
            padding: 1rem 2rem;
        }
        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 400;
        }
        main {
            padding: 2rem;
        }
        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 900px;
            margin: 0 auto;
        }
        .filter-section {
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        .filter-group label {
            font-weight: 500;
            margin-bottom: .25rem;
            font-size: .9rem;
        }
        .filter-group select {
            padding: .5rem;
            border: 1px solid #ccc;
            border-radius: var(--radius);
            font-size: 1rem;
        }
        button.filter-btn {
            padding: .5rem 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
        }
        button.filter-btn:hover {
            background: #234a86;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
            font-size: .9rem;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: .5rem .75rem;
            text-align: center;
            vertical-align: top;
        }
        th {
            background: var(--bg);
            font-weight: 500;
        }
        .logout {
            float: right;
            font-size: .9rem;
            color: #fff;
            text-decoration: none;
        }
        .logout:hover { text-decoration: underline; }
        </style>
    </head>
    <body>
        <header>
            <h1>Com Info – Admin<span class="logout"><a href="index.html" class="logout">Logout</a></span></h1>
        </header>
        <main>
            <div class="card">
                <h2>Building Electricity Usage Report</h2>
    
                <div class="filter-section">
                    <div class="filter-group">
                        <label for="yearSelect">Year:</label>
                        <select id="yearSelect">
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                        </select>
                    </div>
    
                    <div class="filter-group">
                        <label for="monthSelect">Month:</label>
                        <select id="monthSelect">
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>
    
                    <div class="filter-group">
                        <label for="buildingSelect">Building:</label>
                        <select id="buildingSelect">
                            <option value="A">Building A</option>
                            <option value="B">Building B</option>
                            <option value="C">Building C</option>
                        </select>
                    </div>
    
                    <div class="filter-group">
                        <label for="floorSelect">Floor:</label>
                        <select id="floorSelect">
                            <option value="1">Floor 1</option>
                            <option value="2">Floor 2</option>
                            <option value="3">Floor 3</option>
                            <option value="4">Floor 4</option>
                            <option value="5">Floor 5</option>
                        </select>
                    </div>
    
                    <button class="filter-btn" onclick="updateTable()">Apply Filter</button>
                </div>
    
                <div id="rateSection" style="margin-bottom:1rem; font-size:.9rem;">
                    <label for="providerRate">Utility Rate (฿/kWh):</label>
                    <input type="number" id="providerRate" value="4.5" min="0" step="any" style="width:80px; margin-left:.5rem;" />
                    <button class="filter-btn" style="margin-left:.5rem;" onclick="updateTable()">Recalculate</button>
                </div>
    
                <table id="usageTable">
                    <thead>
                        <tr>
                            <th>Building</th>
                            <th>Floor</th>
                            <th>Room</th>
                            <th>Meter start</th>
                            <th>Meter end</th>
                            <th>Units (kWh)</th>
                            <th>Tenant Cost (฿)</th>
                            <th>Provider Cost (฿)</th>
                            <th>Profit (฿)</th>
                            <th>Paid?</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
    
            </div>
        </main>
    
    <script>
        const RATE = 8; // ราคาที่เก็บจากผู้เช่า (บาท/หน่วย)
        
        // 1. ฟังก์ชันดึงข้อมูลสรุปภาพรวมจาก Database จริง
        async function fetchAdminSummary() {
            try {
                const resp = await fetch('/api/admin-report');
                const data = await resp.json();
                
                // นำข้อมูลจาก DB มาแสดงในตาราง (แถวสรุป)
                // หมายเหตุ: ในฐานข้อมูลจริง ข้อมูลจะถูกคำนวณมาให้แล้วจาก View: admin_energy_report
                updateTableUI(data);
            } catch (err) {
                console.error('Error fetching admin report:', err);
            }
        }
    
        // 2. ฟังก์ชันอัปเดต UI ตาราง (ปรับให้รับข้อมูลจาก API)
        function updateTableUI(summaryData) {
            const tbody = document.querySelector('#usageTable tbody');
            tbody.innerHTML = '';
    
            // แสดงแถวข้อมูลภาพรวม (ตัวอย่างดึงจากฐานข้อมูล)
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>All</td>
                <td>All</td>
                <td>Summary</td>
                <td>-</td>
                <td>-</td>
                <td>${summaryData.total_units || 0}</td>
                <td>${(summaryData.income_from_tenants || 0).toLocaleString()}</td>
                <td>${(summaryData.cost_to_pea || 0).toLocaleString()}</td>
                <td style="color:${summaryData.profit < 0 ? 'red' : 'green'}">
                    <strong>${(summaryData.profit || 0).toLocaleString()}</strong>
                </td>
                <td>✅</td>
            `;
            tbody.appendChild(tr);
        }
    
        // ฟังก์ชัน Logout แก้ทางไปไฟล์ sign in
        document.querySelector('.logout a').href = 'sign in.html';
    
        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        fetchAdminSummary();
    
        // ส่วนของ Filter (ในเวอร์ชันเริ่มต้นนี้จะเรียกข้อมูลสรุปรวมมาแสดงก่อน)
        function updateTable() {
            fetchAdminSummary();
        }
        </script>
</body>

</html>
